<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Splits</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007aff">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">

  <style>
    :root {
      --bg-a: #dce8ff;
      --bg-b: #f2f2f7;
      --glass: rgba(255,255,255,0.78);
      --glass-border: rgba(255,255,255,0.55);
      --card-solid: #ffffff;
      --text: #1c1c1e;
      --text-sub: #6c6c70;
      --text-muted: #aeaeb2;
      --border: rgba(0,0,0,0.09);
      --border-solid: #d1d1d6;
      --input-bg: rgba(120,120,130,0.1);
      --primary: #007aff;
      --success: #34c759;
      --danger: #ff3b30;
      --warning: #ff9500;
      --tag-bg: rgba(0,122,255,0.1);
      --tag-text: #0063cc;
      --row-bg: rgba(120,120,130,0.07);
      --seg-bg: rgba(120,120,130,0.14);
      --seg-active: #ffffff;
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.08);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.1);
      --shadow-blue: 0 4px 18px rgba(0,122,255,0.3);
      --plus: #248a3d;
      --minus: #d70015;
      --xfer: #007aff;
      --banner-bg: rgba(255,149,0,0.1);
      --banner-border: rgba(255,149,0,0.3);
      --banner-text: #7d5200;
      --editing-bg: rgba(0,122,255,0.07);
      --split-ok: #248a3d;
      --split-err: #d70015;
    }

    [data-theme="dark"] {
      --bg-a: #0d1426;
      --bg-b: #1c1c1e;
      --glass: rgba(36,36,40,0.84);
      --glass-border: rgba(255,255,255,0.08);
      --card-solid: #2c2c2e;
      --text: #f5f5f7;
      --text-sub: #98989d;
      --text-muted: #636366;
      --border: rgba(255,255,255,0.09);
      --border-solid: #38383a;
      --input-bg: rgba(120,120,130,0.2);
      --primary: #0a84ff;
      --success: #30d158;
      --danger: #ff453a;
      --warning: #ff9f0a;
      --tag-bg: rgba(10,132,255,0.16);
      --tag-text: #409cff;
      --row-bg: rgba(120,120,130,0.1);
      --seg-bg: rgba(120,120,130,0.22);
      --seg-active: rgba(255,255,255,0.11);
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.38);
      --shadow-blue: 0 4px 18px rgba(10,132,255,0.3);
      --plus: #30d158;
      --minus: #ff453a;
      --xfer: #0a84ff;
      --banner-bg: rgba(255,159,10,0.12);
      --banner-border: rgba(255,159,10,0.3);
      --banner-text: #ff9f0a;
      --editing-bg: rgba(10,132,255,0.1);
      --split-ok: #30d158;
      --split-err: #ff453a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Hiragino Sans', sans-serif;
      background: linear-gradient(155deg, var(--bg-a) 0%, var(--bg-b) 55%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 48px;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 600px; margin: 0 auto; padding: 0 16px; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 52px 2px 22px;
    }

    .app-title {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text);
    }
    .app-title .dot { color: var(--primary); }

    .icon-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.15s ease;
    }
    .icon-btn:active { transform: scale(0.9); }

    /* ── Section label ── */
    .sec-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--primary);
      padding: 0 4px;
      margin-bottom: 7px;
    }
    .sec-label.mt { margin-top: 16px; }

    /* ── Card ── */
    .card {
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 18px 18px 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow-md);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 14px -18px;
    }

    /* ── Form rows ── */
    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 9px;
    }

    input, select {
      flex: 1; min-width: 0;
      padding: 12px 13px;
      border: 1.5px solid transparent;
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      background: var(--input-bg);
      -webkit-appearance: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--card-solid);
      box-shadow: 0 0 0 3px rgba(0,122,255,0.14);
    }
    [data-theme="dark"] input:focus,
    [data-theme="dark"] select:focus { background: rgba(255,255,255,0.06); }
    input::placeholder { color: var(--text-muted); }

    /* ── Buttons ── */
    button {
      cursor: pointer;
      border: none;
      border-radius: 12px;
      font-size: 0.92rem;
      font-weight: 600;
      font-family: inherit;
      padding: 12px 18px;
      line-height: 1.2;
      white-space: nowrap;
      transition: transform 0.14s ease, filter 0.14s ease, opacity 0.2s;
    }
    button:active:not(:disabled) { transform: scale(0.96); }
    button:disabled { opacity: 0.32; cursor: not-allowed; }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: var(--shadow-blue);
    }
    .btn-primary:hover:not(:disabled) { filter: brightness(1.08); }

    .btn-ghost {
      background: var(--input-bg);
      color: var(--text-sub);
    }
    .btn-ghost:hover:not(:disabled) { filter: brightness(0.93); }

    .btn-calc {
      width: 100%;
      padding: 16px;
      font-size: 1.02rem;
      letter-spacing: -0.01em;
      background: var(--primary);
      color: #fff;
      border-radius: 16px;
      box-shadow: var(--shadow-blue);
    }
    .btn-calc:hover:not(:disabled) { filter: brightness(1.08); }

    .btn-reset {
      width: 100%;
      padding: 13px;
      font-size: 0.87rem;
      background: rgba(255,59,48,0.09);
      color: var(--danger);
      border-radius: 14px;
      margin-top: 10px;
    }
    [data-theme="dark"] .btn-reset { background: rgba(255,69,58,0.13); }

    .btn-pill {
      padding: 5px 13px;
      font-size: 0.77rem;
      font-weight: 600;
      border-radius: 20px;
      background: rgba(0,122,255,0.1);
      color: var(--primary);
    }
    .btn-pill:hover { filter: brightness(0.93); }
    .btn-pill-danger {
      background: rgba(255,59,48,0.1);
      color: var(--danger);
    }
    [data-theme="dark"] .btn-pill-danger { background: rgba(255,69,58,0.14); }
    .btn-pill-warn {
      background: rgba(255,149,0,0.12);
      color: var(--warning);
    }

    .btn-icon {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.82rem;
      flex-shrink: 0;
      padding: 0;
    }
    .btn-icon-edit { background: rgba(255,149,0,0.12); color: var(--warning); }
    [data-theme="dark"] .btn-icon-edit { background: rgba(255,159,10,0.15); }
    .btn-icon-del  { background: rgba(255,59,48,0.1);  color: var(--danger); }
    [data-theme="dark"] .btn-icon-del  { background: rgba(255,69,58,0.15); }

    /* ── Restore banner ── */
    .restore-banner {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      background: var(--glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 11px 14px;
      margin-bottom: 10px;
      font-size: 0.85rem;
      color: var(--text-sub);
      box-shadow: var(--shadow-sm);
    }
    .restore-banner.show { display: flex; }
    .restore-banner .btn-group { display: flex; gap: 6px; }

    /* ── Member tags ── */
    .tag-list {
      display: flex; flex-wrap: wrap; gap: 7px;
      margin-top: 11px; min-height: 30px;
    }
    .tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--tag-bg);
      color: var(--tag-text);
      border-radius: 20px;
      padding: 5px 13px 5px 15px;
      font-size: 0.85rem; font-weight: 600;
    }
    .tag .x {
      cursor: pointer;
      width: 17px; height: 17px;
      border-radius: 50%;
      background: rgba(0,122,255,0.18);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.68rem; font-weight: 700;
      color: var(--primary);
      transition: background 0.15s, color 0.15s;
      line-height: 1;
    }
    .tag .x:hover { background: var(--danger); color: #fff; }

    /* ── Edit banner ── */
    .edit-banner {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: var(--banner-bg);
      border: 1px solid var(--banner-border);
      border-radius: 12px;
      padding: 9px 13px;
      margin-bottom: 13px;
      font-size: 0.84rem;
      color: var(--banner-text);
    }
    .edit-banner.show { display: flex; }

    /* ── Segmented control ── */
    .seg-ctrl {
      display: flex;
      background: var(--seg-bg);
      border-radius: 10px;
      padding: 3px; gap: 3px;
      margin-bottom: 13px;
    }
    .seg-btn {
      flex: 1;
      padding: 7px 0;
      border-radius: 8px;
      font-size: 0.82rem; font-weight: 600;
      background: transparent;
      color: var(--text-muted);
      border: none; cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
    }
    .seg-btn.active {
      background: var(--seg-active);
      color: var(--text);
      box-shadow: var(--shadow-sm);
    }

    /* ── Split area ── */
    .split-area {
      display: none;
      margin-top: 11px;
      padding: 13px 14px;
      background: var(--row-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    .split-area.visible { display: block; }

    /* Equal mode */
    .participants-header {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 9px;
      font-size: 0.81rem; font-weight: 600;
      color: var(--text-sub);
    }
    .check-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .check-label {
      display: inline-flex; align-items: center;
      padding: 6px 14px;
      border: 1.5px solid var(--border-solid);
      border-radius: 20px;
      font-size: 0.82rem;
      cursor: pointer;
      background: var(--card-solid);
      color: var(--text-sub);
      user-select: none;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    [data-theme="dark"] .check-label { background: rgba(255,255,255,0.05); }
    .check-label:hover { border-color: var(--primary); }
    .check-label.checked {
      background: var(--tag-bg);
      border-color: var(--primary);
      color: var(--primary);
      font-weight: 600;
    }
    .split-preview {
      margin-top: 9px;
      font-size: 0.81rem;
      color: var(--text-sub);
      min-height: 18px;
    }

    /* Custom mode */
    .split-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .split-row:last-of-type { border-bottom: none; }
    .split-row .split-name {
      flex: 1;
      font-size: 0.9rem; font-weight: 500; color: var(--text);
    }
    .split-row .split-input {
      width: 96px; flex: 0 0 auto;
      text-align: right;
      padding: 8px 10px;
      font-size: 0.9rem;
      border-radius: 10px;
      background: var(--card-solid);
      border: 1.5px solid var(--border-solid);
      margin: 0;
    }
    [data-theme="dark"] .split-row .split-input { background: rgba(255,255,255,0.06); }

    .split-footer {
      display: flex; align-items: center; justify-content: flex-end;
      padding-top: 9px; margin-top: 3px;
      border-top: 1px solid var(--border);
      font-size: 0.82rem;
    }
    .split-ok  { color: var(--split-ok);  font-weight: 700; }
    .split-err { color: var(--split-err); font-weight: 700; }

    /* ── Payment list ── */
    .payment-item {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .payment-item:last-child { border-bottom: none; }
    .payment-item.editing {
      background: var(--editing-bg);
      border-radius: 12px;
      padding: 10px 11px;
      margin: 0 -11px;
      border-bottom: none;
    }
    .pi-info { flex: 1; min-width: 0; }
    .pi-top  { display: flex; align-items: baseline; gap: 8px; }
    .pi-payer  { font-size: 0.87rem; font-weight: 700; }
    .pi-amount { font-size: 1rem; font-weight: 700; color: var(--primary); }
    .pi-meta   { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
    .pi-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* ── Error ── */
    .error-msg {
      display: none;
      color: var(--danger);
      font-size: 0.81rem;
      margin-top: 6px;
      padding: 8px 12px;
      background: rgba(255,59,48,0.08);
      border-radius: 8px;
    }
    [data-theme="dark"] .error-msg { background: rgba(255,69,58,0.12); }

    /* ── Result ── */
    #result { display: none; }

    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 12px; overflow: hidden; }
    .balance-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    .balance-table th {
      background: var(--row-bg);
      padding: 9px 10px;
      text-align: left;
      font-size: 0.79rem; font-weight: 600;
      color: var(--text-sub);
    }
    .balance-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); }
    .balance-table tr:last-child td { border-bottom: none; }

    .plus  { color: var(--plus);  font-weight: 700; }
    .minus { color: var(--minus); font-weight: 700; }
    .zero  { color: var(--text-muted); }

    .rounding-note {
      font-size: 0.79rem; color: var(--text-sub);
      margin-top: 10px; padding: 8px 12px;
      background: var(--row-bg);
      border-radius: 10px;
      border-left: 3px solid var(--xfer);
    }

    /* Transfer list */
    .transfer-list { list-style: none; }
    .transfer-list li {
      display: flex; align-items: center; gap: 9px;
      padding: 13px 14px; margin-bottom: 7px;
      background: var(--row-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .transfer-list li:last-child { margin-bottom: 0; }
    .t-from { font-weight: 700; }
    .t-arrow { color: var(--text-muted); }
    .t-to   { font-weight: 700; }
    .t-amt  { margin-left: auto; font-weight: 700; color: var(--primary); font-size: 0.95rem; }

    .no-transfer {
      text-align: center; padding: 18px;
      color: var(--plus); font-weight: 600; font-size: 0.93rem;
      background: rgba(52,199,89,0.09);
      border-radius: 12px;
    }
    [data-theme="dark"] .no-transfer { background: rgba(48,209,88,0.1); }

    /* Share / copy */
    .share-row { display: flex; gap: 8px; margin-top: 14px; }
    .btn-copy {
      flex: 0 0 auto;
      background: rgba(0,122,255,0.1);
      color: var(--primary);
      padding: 12px 16px; border-radius: 12px;
    }
    [data-theme="dark"] .btn-copy { background: rgba(10,132,255,0.15); }
    .btn-line {
      flex: 1;
      background: rgba(6,199,85,0.11); color: #0a8a3d;
      border-radius: 12px; padding: 12px;
    }
    [data-theme="dark"] .btn-line { background: rgba(48,209,88,0.12); color: #30d158; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 26px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(28,28,30,0.9); color: #fff;
      padding: 11px 24px; border-radius: 24px;
      font-size: 0.87rem; font-weight: 500;
      box-shadow: 0 6px 28px rgba(0,0,0,0.22);
      z-index: 9999; white-space: nowrap; pointer-events: none;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transition: transform 0.3s cubic-bezier(.34,1.4,.64,1);
    }
    [data-theme="dark"] .toast { background: rgba(240,240,245,0.93); color: #1c1c1e; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Utility ── */
    .mt10 { margin-top: 10px; }
    .mt14 { margin-top: 14px; }
    .center { text-align: center; }
    .empty-hint { color: var(--text-muted); font-size: 0.83rem; text-align: center; padding: 6px 0; }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="app-title">Splits<span class="dot">.</span></div>
    <button class="icon-btn" id="darkBtn" onclick="toggleDark()">🌙</button>
  </div>

  <!-- Restore banner -->
  <div class="restore-banner" id="restoreBanner">
    <span>💾 前回のデータが保存されています</span>
    <div class="btn-group">
      <button class="btn-pill" onclick="applyRestore()">復元</button>
      <button class="btn-pill btn-pill-danger" onclick="dismissRestore()">破棄</button>
    </div>
  </div>

  <!-- ① Members -->
  <div class="sec-label">メンバー</div>
  <div class="card">
    <div class="row">
      <input type="text" id="memberInput" placeholder="名前を入力（例：田中）" maxlength="20">
      <button class="btn-primary" onclick="addMember()">追加</button>
    </div>
    <p class="error-msg" id="memberError"></p>
    <div class="tag-list" id="memberList"></div>
  </div>

  <!-- ② Payment input -->
  <div class="sec-label mt">支払い入力</div>
  <div class="card">
    <div class="edit-banner" id="editBanner">
      <span>✏️ 支払いを編集中…</span>
      <button class="btn-pill btn-pill-warn" onclick="cancelEdit()">キャンセル</button>
    </div>

    <div class="row">
      <select id="payerSelect">
        <option value="">支払い者</option>
      </select>
      <input type="number" id="amountInput" placeholder="金額（円）" min="1" step="1" inputmode="numeric">
    </div>
    <div class="row">
      <input type="text" id="descInput" placeholder="内容（例：夕食・交通費）" maxlength="30">
      <button class="btn-primary" id="paySubmitBtn" onclick="submitPayment()">追加</button>
    </div>

    <!-- Split area -->
    <div class="split-area" id="splitArea">
      <div class="seg-ctrl">
        <button class="seg-btn active" id="tabCustom" onclick="setSplitMode('custom')">金額指定</button>
        <button class="seg-btn"        id="tabEqual"  onclick="setSplitMode('equal')">均等割り</button>
      </div>

      <!-- Custom mode (default) -->
      <div id="customArea">
        <div class="split-inputs" id="customSplitInputs"></div>
        <div class="split-footer">
          <span id="splitRemainingText"></span>
        </div>
      </div>

      <!-- Equal mode -->
      <div id="equalArea" style="display:none">
        <div class="participants-header">
          <span>負担者</span>
          <button type="button" class="btn-pill" onclick="selectAllParticipants()">全員</button>
          <button type="button" class="btn-pill btn-pill-danger" onclick="clearParticipants()">クリア</button>
        </div>
        <div class="check-list" id="participantsChecks"></div>
        <div class="split-preview" id="equalPreview"></div>
      </div>
    </div>

    <p class="error-msg" id="paymentError"></p>
    <div id="paymentList" class="mt10"></div>
  </div>

  <!-- ③ Calculate -->
  <button class="btn-calc mt14" id="calcBtn" onclick="calculate()" disabled>精算を計算する</button>
  <p class="error-msg center" id="calcError" style="margin-top:8px;"></p>

  <!-- ④ Result -->
  <div class="card mt14" id="result">
    <div class="sec-label" style="margin-bottom:11px;">収支サマリー</div>
    <div class="table-wrap">
      <table class="balance-table">
        <thead><tr><th>名前</th><th>支払い</th><th>負担</th><th>収支</th></tr></thead>
        <tbody id="balanceBody"></tbody>
      </table>
    </div>
    <p class="rounding-note" id="roundingNote" style="display:none;"></p>

    <hr class="divider">

    <div class="sec-label" style="margin-bottom:11px;">最小送金プラン</div>
    <div id="transferResult"></div>

    <div class="share-row">
      <button class="btn-copy" onclick="copyResult()">📋 コピー</button>
      <button class="btn-line" onclick="shareToLine()">💬 LINEで送る</button>
    </div>
    <button class="btn-reset" onclick="resetAll()">🔄 リセット</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ===== State =====
  const state = {
    members:   [],
    payments:  [],   // { id, payer, amount, desc, splits:[{userId,amount}], createdAt }
    editIndex: -1,
    lastCalc:  null
  };

  let pendingSaved = null;
  let splitMode = 'custom'; // default: custom

  const $ = id => document.getElementById(id);

  // ===== Utils =====
  function showError(id, msg) {
    const el = $(id);
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.style.display = 'none'; }, 3500);
  }

  let _toastTimer;
  function showToast(msg, ms = 2200) {
    clearTimeout(_toastTimer);
    const el = $('toast');
    el.textContent = msg;
    el.classList.add('show');
    _toastTimer = setTimeout(() => el.classList.remove('show'), ms);
  }

  function fmt(n) { return '¥' + Math.abs(n).toLocaleString('ja-JP'); }

  function fmtSigned(n) {
    const s = n > 0 ? '+' : n < 0 ? '−' : '';
    return s + '¥' + Math.abs(n).toLocaleString('ja-JP');
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  }

  // ===== Storage =====
  const STORE_KEY = 'warikan_v3';

  function saveState() {
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify({
        members: state.members, payments: state.payments
      }));
    } catch(e) {}
  }

  function initFromStorage() {
    try {
      const raw = localStorage.getItem(STORE_KEY) || localStorage.getItem('warikan_v2');
      if (!raw) return;
      const data = JSON.parse(raw);
      const hasData = (data.members?.length > 0) || (data.payments?.length > 0);
      if (hasData) { pendingSaved = data; $('restoreBanner').classList.add('show'); }
    } catch(e) { localStorage.removeItem(STORE_KEY); }
  }

  function applyRestore() {
    if (!pendingSaved) return;
    state.members  = pendingSaved.members  || [];
    state.payments = (pendingSaved.payments || []).map(migrateLegacyPayment);
    pendingSaved = null;
    $('restoreBanner').classList.remove('show');
    renderAll();
    showToast('✅ 前回のデータを復元しました');
  }

  function dismissRestore() {
    pendingSaved = null;
    $('restoreBanner').classList.remove('show');
    localStorage.removeItem(STORE_KEY);
    localStorage.removeItem('warikan_v2');
  }

  function migrateLegacyPayment(p) {
    if (p.splits && p.splits.length > 0) return p;
    const parts = (p.participants?.length > 0) ? p.participants : state.members;
    return {
      id: p.id || genId(), payer: p.payer, amount: p.amount,
      desc: p.desc || '（記録なし）',
      splits: computeEqualSplits(p.amount, parts, p.payer),
      createdAt: p.createdAt || Date.now()
    };
  }

  // ===== Dark mode =====
  function initTheme() {
    if (localStorage.getItem('warikan_dark') === 'true') {
      document.documentElement.setAttribute('data-theme','dark');
      $('darkBtn').textContent = '☀️';
    }
  }

  function toggleDark() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isDark) {
      document.documentElement.removeAttribute('data-theme');
      $('darkBtn').textContent = '🌙';
      localStorage.setItem('warikan_dark','false');
    } else {
      document.documentElement.setAttribute('data-theme','dark');
      $('darkBtn').textContent = '☀️';
      localStorage.setItem('warikan_dark','true');
    }
  }

  // ===== Calc button =====
  function updateCalcBtn() {
    $('calcBtn').disabled = !(state.members.length >= 2 && state.payments.length >= 1);
  }

  // ===== Members =====
  function addMember() {
    const input = $('memberInput');
    const name  = input.value.trim();
    if (!name)                        { showError('memberError','名前を入力してください'); return; }
    if (state.members.includes(name)) { showError('memberError',`「${name}」は既に追加されています`); return; }
    if (state.members.length >= 20)   { showError('memberError','メンバーは最大20人です'); return; }
    state.members.push(name);
    input.value = '';
    renderMembers();
    syncPayerSelect();
    refreshSplitArea();
    updateCalcBtn();
    saveState();
  }

  function removeMember(name) {
    const n = state.payments.filter(p => p.payer === name).length;
    const msg = n > 0
      ? `「${name}」を削除します。\nこのメンバーの支払い記録（${n}件）も削除されます。よろしいですか？`
      : `「${name}」を削除しますか？`;
    if (!confirm(msg)) return;
    state.payments = state.payments.filter(p => p.payer !== name);
    state.payments.forEach(p => { if (p.splits) p.splits = p.splits.filter(s => s.userId !== name); });
    state.members  = state.members.filter(m => m !== name);
    cancelEdit();
    renderAll();
    saveState();
    $('result').style.display = 'none';
  }

  function renderMembers() {
    const list = $('memberList');
    if (state.members.length === 0) {
      list.innerHTML = '<span class="empty-hint">メンバーを追加してください</span>';
      return;
    }
    list.innerHTML = state.members.map(name => `
      <div class="tag">${esc(name)}
        <span class="x" onclick="removeMember('${esc(name)}')">✕</span>
      </div>`).join('');
  }

  function syncPayerSelect() {
    const sel = $('payerSelect'), cur = sel.value;
    sel.innerHTML = '<option value="">支払い者</option>' +
      state.members.map(m =>
        `<option value="${esc(m)}"${m===cur?' selected':''}>${esc(m)}</option>`
      ).join('');
  }

  // ===== Split area =====
  function refreshSplitArea() {
    const area = $('splitArea');
    if (state.members.length === 0) { area.classList.remove('visible'); return; }
    area.classList.add('visible');
    if (splitMode === 'equal') { renderParticipantsChecks(); updateEqualPreview(); }
    else                       { renderCustomSplitInputs(); }
  }

  function setSplitMode(mode) {
    splitMode = mode;
    $('tabCustom').classList.toggle('active', mode === 'custom');
    $('tabEqual').classList.toggle('active',  mode === 'equal');
    $('customArea').style.display = mode === 'custom' ? '' : 'none';
    $('equalArea').style.display  = mode === 'equal'  ? '' : 'none';
    if (mode === 'custom') { renderCustomSplitInputs(); }
    if (mode === 'equal')  {
      renderParticipantsChecks();
      updateEqualPreview();
      $('paySubmitBtn').disabled = false;
    }
  }

  // ===== Equal mode =====
  function computeEqualSplits(amount, participants, payer = null) {
    if (!participants || participants.length === 0) return [];
    const n     = participants.length;
    const share = Math.floor(amount / n);
    const rem   = amount - share * n;
    const remRx = (payer && participants.includes(payer))
      ? payer : participants[participants.length - 1];
    return participants.map(userId => ({
      userId,
      amount: rem > 0 && userId === remRx ? share + rem : share
    }));
  }

  function renderParticipantsChecks() {
    const list = $('participantsChecks');
    if (state.members.length === 0) { list.innerHTML = ''; return; }
    const existing = new Set(Array.from(list.querySelectorAll('.check-label')).map(el => el.dataset.name));
    const checked  = new Set(Array.from(list.querySelectorAll('.check-label.checked')).map(el => el.dataset.name));
    list.innerHTML = state.members.map(name => {
      const on = existing.size === 0 || checked.has(name) || !existing.has(name);
      return `<span class="check-label${on?' checked':''}" data-name="${esc(name)}" onclick="toggleParticipant(this)">${esc(name)}</span>`;
    }).join('');
  }

  function toggleParticipant(el) { el.classList.toggle('checked'); updateEqualPreview(); }

  function selectAllParticipants() {
    document.querySelectorAll('#participantsChecks .check-label').forEach(el => el.classList.add('checked'));
    updateEqualPreview();
  }

  function clearParticipants() {
    document.querySelectorAll('#participantsChecks .check-label').forEach(el => el.classList.remove('checked'));
    updateEqualPreview();
  }

  function getSelectedParticipants() {
    return Array.from(document.querySelectorAll('#participantsChecks .check-label.checked')).map(el => el.dataset.name);
  }

  function setCheckedParticipants(names) {
    const s = new Set(names);
    document.querySelectorAll('#participantsChecks .check-label').forEach(el => {
      el.classList.toggle('checked', s.has(el.dataset.name));
    });
    updateEqualPreview();
  }

  function updateEqualPreview() {
    const preview = $('equalPreview');
    const parts   = getSelectedParticipants();
    const amount  = parseInt($('amountInput').value, 10);
    if (parts.length === 0 || !amount || amount < 1) { preview.textContent = ''; return; }
    const share = Math.floor(amount / parts.length);
    const rem   = amount - share * parts.length;
    if (rem > 0) {
      const payer = $('payerSelect').value;
      const rx    = (payer && parts.includes(payer)) ? payer : parts[parts.length - 1];
      preview.textContent = `1人あたり ${fmt(share)}　/ ${esc(rx)} のみ +¥${rem}（端数）`;
    } else {
      preview.textContent = `1人あたり ${fmt(share)}`;
    }
  }

  // ===== Custom mode =====
  function renderCustomSplitInputs(preserveValues = false) {
    const area = $('customSplitInputs');
    let saved = {};
    if (preserveValues) {
      area.querySelectorAll('.split-row').forEach(row => {
        const v = parseInt(row.querySelector('.split-input').value, 10);
        if (!isNaN(v)) saved[row.dataset.name] = v;
      });
    }
    area.innerHTML = state.members.map(name => {
      const val = preserveValues && saved[name] !== undefined ? saved[name] : '';
      return `
        <div class="split-row" data-name="${esc(name)}">
          <span class="split-name">${esc(name)}</span>
          <input class="split-input" type="number" min="0" step="1" inputmode="numeric"
                 value="${val}" placeholder="0"
                 oninput="this.value=this.value.replace(/[^0-9]/g,''); updateCustomRemaining()">
        </div>`;
    }).join('');
    updateCustomRemaining();
  }

  function updateCustomRemaining() {
    const amount = parseInt($('amountInput').value, 10) || 0;
    const summed = Array.from($('customSplitInputs').querySelectorAll('.split-input'))
      .reduce((s, el) => s + (parseInt(el.value, 10) || 0), 0);
    const diff = amount - summed;
    const el   = $('splitRemainingText');
    const btn  = $('paySubmitBtn');
    if (diff === 0 && amount > 0) {
      el.innerHTML = `<span class="split-ok">✓ 合計 ${fmt(amount)}</span>`;
      btn.disabled = false;
    } else if (diff > 0) {
      el.innerHTML = `<span class="split-err">残り ${fmt(diff)}</span>`;
      btn.disabled = true;
    } else if (diff < 0) {
      el.innerHTML = `<span class="split-err">超過 ${fmt(Math.abs(diff))}</span>`;
      btn.disabled = true;
    } else {
      el.innerHTML = '';
      btn.disabled = true;
    }
  }

  // ===== Build splits from UI =====
  function getBuiltSplits() {
    const amount = parseInt($('amountInput').value, 10) || 0;
    if (splitMode === 'equal') {
      return computeEqualSplits(amount, getSelectedParticipants(), $('payerSelect').value || null);
    }
    const splits = [];
    $('customSplitInputs').querySelectorAll('.split-row').forEach(row => {
      const userId = row.dataset.name;
      const amt    = parseInt(row.querySelector('.split-input').value, 10) || 0;
      if (amt > 0) splits.push({ userId, amount: amt });
    });
    return splits;
  }

  // ===== Payment =====
  function submitPayment() {
    const payer  = $('payerSelect').value;
    const rawVal = $('amountInput').value;
    const amount = parseInt(rawVal, 10);
    const desc   = $('descInput').value.trim();

    if (!payer)                       { showError('paymentError','支払い者を選択してください'); return; }
    if (rawVal === '')                { showError('paymentError','金額を入力してください'); return; }
    if (isNaN(amount) || amount < 1) { showError('paymentError','1円以上の整数を入力してください'); return; }
    if (amount > 999_999_999)        { showError('paymentError','金額が大きすぎます（上限9桁）'); return; }

    const splits = getBuiltSplits();
    if (splits.length === 0) { showError('paymentError','負担者を1人以上入力してください'); return; }

    if (splitMode === 'custom') {
      const total = splits.reduce((s, sp) => s + sp.amount, 0);
      if (total !== amount) {
        showError('paymentError',`負担額の合計（${fmt(total)}）が支払金額（${fmt(amount)}）と一致しません`);
        return;
      }
    }

    const entry = {
      id:        state.editIndex >= 0 ? state.payments[state.editIndex].id : genId(),
      payer, amount,
      desc:      desc || '（記録なし）',
      splits,
      createdAt: state.editIndex >= 0 ? state.payments[state.editIndex].createdAt : Date.now()
    };

    if (state.editIndex >= 0) {
      state.payments[state.editIndex] = entry;
      cancelEdit();
      showToast('✅ 支払い情報を更新しました');
    } else {
      state.payments.push(entry);
    }

    $('amountInput').value = '';
    $('descInput').value   = '';
    $('payerSelect').value = '';
    setSplitMode('custom');
    renderPayments();
    updateCalcBtn();
    saveState();
    $('result').style.display = 'none';
  }

  function startEdit(index) {
    const p = state.payments[index];
    state.editIndex = index;
    $('payerSelect').value        = p.payer;
    $('amountInput').value        = p.amount;
    $('descInput').value          = p.desc === '（記録なし）' ? '' : p.desc;
    $('paySubmitBtn').textContent = '更新';
    $('editBanner').classList.add('show');

    const splits      = p.splits || [];
    const participants = splits.map(s => s.userId);
    const equalSplits  = computeEqualSplits(p.amount, participants, p.payer);
    const isEqual = splits.length === equalSplits.length &&
      splits.every((s,i) => s.userId === equalSplits[i].userId && s.amount === equalSplits[i].amount);

    if (isEqual) {
      setSplitMode('equal');
      setCheckedParticipants(participants);
    } else {
      setSplitMode('custom');
      renderCustomSplitInputs(false);
      const area = $('customSplitInputs');
      splits.forEach(s => {
        const row = area.querySelector(`.split-row[data-name="${s.userId}"]`);
        if (row) row.querySelector('.split-input').value = s.amount;
      });
      updateCustomRemaining();
    }

    renderPayments();
    $('payerSelect').scrollIntoView({ behavior:'smooth', block:'center' });
    $('payerSelect').focus();
  }

  function cancelEdit() {
    if (state.editIndex < 0) return;
    state.editIndex = -1;
    $('payerSelect').value        = '';
    $('amountInput').value        = '';
    $('descInput').value          = '';
    $('paySubmitBtn').textContent = '追加';
    $('editBanner').classList.remove('show');
    setSplitMode('custom');
    renderPayments();
  }

  function removePayment(index) {
    if (state.editIndex === index) cancelEdit();
    state.payments.splice(index, 1);
    if (state.editIndex > index) state.editIndex--;
    renderPayments();
    updateCalcBtn();
    saveState();
    $('result').style.display = 'none';
  }

  function renderPayments() {
    const list = $('paymentList');
    if (state.payments.length === 0) {
      list.innerHTML = '<p class="empty-hint">支払い記録がありません</p>';
      return;
    }
    list.innerHTML = state.payments.map((p, i) => {
      const splits = p.splits || [];
      let label = '';
      if      (splits.length === 0)                    label = '負担者なし';
      else if (splits.length === state.members.length) label = '全員';
      else                                             label = splits.map(s => esc(s.userId)).join('・');

      const participants = splits.map(s => s.userId);
      const eqSplits     = computeEqualSplits(p.amount, participants, p.payer);
      const isEq = splits.length > 0 && splits.every((s,i) =>
        s.userId === (eqSplits[i]?.userId) && s.amount === (eqSplits[i]?.amount));
      if (!isEq && splits.length > 0) label += ' · 金額指定';

      const descPart = (p.desc && p.desc !== '（記録なし）') ? p.desc + ' · ' : '';
      return `
        <div class="payment-item${state.editIndex === i ? ' editing' : ''}">
          <div class="pi-info">
            <div class="pi-top">
              <span class="pi-payer">${esc(p.payer)}</span>
              <span class="pi-amount">${fmt(p.amount)}</span>
            </div>
            <div class="pi-meta">${descPart}${label}</div>
          </div>
          <div class="pi-actions">
            <button class="btn-icon btn-icon-edit" onclick="startEdit(${i})">✏️</button>
            <button class="btn-icon btn-icon-del"  onclick="removePayment(${i})">✕</button>
          </div>
        </div>`;
    }).join('');
  }

  // ===== Calculate =====
  function calculate() {
    const paid = {}, burden = {};
    state.members.forEach(m => { paid[m] = 0; burden[m] = 0; });
    state.payments.forEach(p => { paid[p.payer] += p.amount; });

    let hasRounding = false;
    state.payments.forEach(p => {
      (p.splits || []).forEach(s => { if (burden[s.userId] !== undefined) burden[s.userId] += s.amount; });
      const tot = (p.splits || []).reduce((s, sp) => s + sp.amount, 0);
      if (tot < p.amount) hasRounding = true;
    });

    const balance = {};
    state.members.forEach(m => { balance[m] = paid[m] - burden[m]; });

    $('balanceBody').innerHTML = state.members.map(m => {
      const b = balance[m];
      const cls = b > 0 ? 'plus' : b < 0 ? 'minus' : 'zero';
      return `<tr><td>${esc(m)}</td><td>${fmt(paid[m])}</td><td>${fmt(burden[m])}</td><td class="${cls}">${fmtSigned(b)}</td></tr>`;
    }).join('');

    const noteEl = $('roundingNote');
    noteEl.style.display = hasRounding ? 'block' : 'none';
    if (hasRounding) noteEl.textContent = '※端数は切り捨て（支払者に集約）';

    const creditors = [], debtors = [];
    state.members.forEach(m => {
      if (balance[m] > 0) creditors.push({ name: m, amount:  balance[m] });
      if (balance[m] < 0) debtors.push({   name: m, amount: -balance[m] });
    });
    creditors.sort((a,b) => b.amount - a.amount);
    debtors.sort((a,b)   => b.amount - a.amount);

    const transfers = greedySettle(creditors, debtors);

    const div = $('transferResult');
    if (transfers.length === 0) {
      div.innerHTML = '<div class="no-transfer">🎉 精算不要！全員均等に支払っています</div>';
    } else {
      div.innerHTML = `
        <p style="font-size:0.81rem;color:var(--text-sub);margin-bottom:10px;">
          合計 <strong>${transfers.length} 回</strong> の送金で精算できます
        </p>
        <ul class="transfer-list">
          ${transfers.map(t => `
            <li>
              <span class="t-from">${esc(t.from)}</span>
              <span class="t-arrow">→</span>
              <span class="t-to">${esc(t.to)}</span>
              <span class="t-amt">${fmt(t.amount)}</span>
            </li>`).join('')}
        </ul>`;
    }

    state.lastCalc = { paid, burden, balance, transfers };
    $('result').style.display = 'block';
    $('result').scrollIntoView({ behavior:'smooth', block:'start' });
  }

  function greedySettle(creditors, debtors) {
    const transfers = [];
    let ci = 0, di = 0;
    while (ci < creditors.length && di < debtors.length) {
      const cr = creditors[ci], de = debtors[di];
      const amount = Math.min(cr.amount, de.amount);
      if (amount > 0) transfers.push({ from: de.name, to: cr.name, amount });
      cr.amount -= amount; de.amount -= amount;
      if (cr.amount === 0) ci++;
      if (de.amount === 0) di++;
    }
    return transfers;
  }

  // ===== Share =====
  function buildResultText() {
    if (!state.lastCalc) return '';
    const { transfers } = state.lastCalc;
    const lines = ['【Splits 精算結果】', '', '📋 支払い内訳'];
    state.payments.forEach(p => {
      const d = (p.desc && p.desc !== '（記録なし）') ? p.desc : '記録なし';
      lines.push(`・${p.payer} ¥${p.amount.toLocaleString('ja-JP')}（${d}）`);
    });
    lines.push('');
    if (transfers.length === 0) {
      lines.push('📤 精算不要（全員均等）');
    } else {
      lines.push(`📤 最小送金プラン（合計${transfers.length}回）`);
      transfers.forEach(t => { lines.push(`${t.from} → ${t.to}　¥${t.amount.toLocaleString('ja-JP')}`); });
    }
    lines.push('', '💰 PayPayで送る', 'https://bit.ly/warikan-pay');
    return lines.join('\n');
  }

  function copyResult() {
    const text = buildResultText();
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(text)
        .then(()  => showToast('📋 クリップボードにコピーしました'))
        .catch(()  => fallbackCopy(text));
    } else { fallbackCopy(text); }
  }

  function fallbackCopy(text) {
    const el = Object.assign(document.createElement('textarea'), {
      value: text, style: 'position:fixed;left:-9999px;top:-9999px'
    });
    document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
    showToast('📋 クリップボードにコピーしました');
  }

  function shareToLine() {
    window.open('https://line.me/R/msg/text/?' + encodeURIComponent(buildResultText()), '_blank', 'noopener,noreferrer');
  }

  // ===== Reset =====
  function resetAll() {
    if (!confirm('すべてのデータを削除してリセットしますか？\nこの操作は取り消せません。')) return;
    state.members = []; state.payments = []; state.editIndex = -1;
    renderAll();
    $('result').style.display = 'none';
    localStorage.removeItem(STORE_KEY);
    showToast('🔄 リセットしました');
  }

  // ===== Render all =====
  function renderAll() {
    renderMembers();
    renderPayments();
    syncPayerSelect();
    setSplitMode('custom');
    refreshSplitArea();
    updateCalcBtn();
    $('paySubmitBtn').textContent = '追加';
    $('editBanner').classList.remove('show');
  }

  // ===== Events =====
  $('memberInput').addEventListener('keydown', e => { if (e.key === 'Enter') addMember(); });
  $('amountInput').addEventListener('keydown', e => { if (e.key === 'Enter') submitPayment(); });
  $('descInput').addEventListener('keydown',   e => { if (e.key === 'Enter') submitPayment(); });

  $('amountInput').addEventListener('input', function() {
    this.value = this.value.replace(/[^0-9]/g,'');
    if (splitMode === 'equal')  updateEqualPreview();
    if (splitMode === 'custom') updateCustomRemaining();
  });

  // ===== Init =====
  initTheme();
  initFromStorage();
  renderAll();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').catch(() => {});
    });
  }
</script>
</body>
</html>

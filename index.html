<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>割り勘精算計算機</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2b6cb0">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">

  <style>
    /* ===== CSS変数（ライト／ダークモード） ===== */
    :root {
      --bg:            #f2f2f7;
      --card:          #ffffff;
      --text:          #1c1c1e;
      --text-sub:      #6c6c70;
      --text-muted:    #aeaeb2;
      --border:        #d1d1d6;
      --input-bg:      #f2f2f7;
      --tag-bg:        #e8f0fe;
      --tag-border:    #c5d8f9;
      --tag-text:      #1a56b0;
      --primary:       #007aff;
      --primary-text:  #ffffff;
      --btn-add-bg:    #e8f0fe;
      --btn-add-text:  #1a56b0;
      --btn-del-bg:    #ffeef0;
      --btn-del-text:  #d70015;
      --btn-edit-bg:   #fff9e6;
      --btn-edit-text: #7d5c00;
      --btn-rst-bg:    #e5e5ea;
      --btn-rst-text:  #6c6c70;
      --tbl-head:      #f2f2f7;
      --row-bg:        #f8f8fb;
      --xfer-border:   #007aff;
      --plus:          #248a3d;
      --minus:         #d70015;
      --shadow:        rgba(0,0,0,0.07);
      --shadow-card:   rgba(0,0,0,0.06);
      --editing-bg:    #fffbf0;
      --banner-bg:     #fff9e6;
      --banner-border: #ffe08a;
      --banner-text:   #7d5c00;
      --split-ok:      #248a3d;
      --split-err:     #d70015;
    }

    [data-theme="dark"] {
      --bg:            #1c1c1e;
      --card:          #2c2c2e;
      --text:          #f5f5f7;
      --text-sub:      #98989d;
      --text-muted:    #636366;
      --border:        #38383a;
      --input-bg:      #1c1c1e;
      --tag-bg:        #1a3a6b;
      --tag-border:    #1e4d8c;
      --tag-text:      #5aabff;
      --primary:       #0a84ff;
      --primary-text:  #ffffff;
      --btn-add-bg:    #1a3a6b;
      --btn-add-text:  #5aabff;
      --btn-del-bg:    #4a0a10;
      --btn-del-text:  #ff453a;
      --btn-edit-bg:   #3d2e00;
      --btn-edit-text: #ffd60a;
      --btn-rst-bg:    #38383a;
      --btn-rst-text:  #ebebf5;
      --tbl-head:      #38383a;
      --row-bg:        #1c1c1e;
      --xfer-border:   #0a84ff;
      --plus:          #30d158;
      --minus:         #ff453a;
      --shadow:        rgba(0,0,0,0.4);
      --shadow-card:   rgba(0,0,0,0.3);
      --editing-bg:    #2d2200;
      --banner-bg:     #2d2200;
      --banner-border: #7d5c00;
      --banner-text:   #ffd60a;
      --split-ok:      #30d158;
      --split-err:     #ff453a;
    }

    /* ===== リセット ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
      transition: background 0.25s, color 0.25s;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 640px; margin: 0 auto; }

    /* ===== ヘッダー ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .dark-btn {
      cursor: pointer;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 38px;
      height: 38px;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 4px var(--shadow);
      transition: background 0.25s, border-color 0.25s;
    }

    /* ===== 復元バナー ===== */
    .restore-banner {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 14px;
      font-size: 0.87rem;
      color: var(--text-sub);
      box-shadow: 0 1px 6px var(--shadow-card);
    }

    .restore-banner.show { display: flex; }
    .restore-banner .btn-group { display: flex; gap: 6px; }

    /* ===== カード ===== */
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 18px 18px 14px;
      margin-bottom: 12px;
      box-shadow: 0 1px 8px var(--shadow-card);
      transition: background 0.25s;
    }

    .card-title {
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-sub);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 14px 0;
    }

    /* ===== フォーム ===== */
    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    input, select {
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--input-bg);
      transition: border-color 0.18s, background 0.25s, box-shadow 0.18s;
      -webkit-appearance: none;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--card);
      box-shadow: 0 0 0 3px rgba(0,122,255,0.12);
    }

    input::placeholder { color: var(--text-muted); }

    /* ===== ボタン共通 ===== */
    button {
      cursor: pointer;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 10px 16px;
      transition: filter 0.15s, transform 0.1s, opacity 0.2s;
      white-space: nowrap;
      line-height: 1.2;
    }

    button:active:not(:disabled) { transform: scale(0.97); }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-add { background: var(--btn-add-bg); color: var(--btn-add-text); }
    .btn-add:hover:not(:disabled) { filter: brightness(0.94); }

    .btn-del  { background: var(--btn-del-bg);  color: var(--btn-del-text);  padding: 7px 10px; font-size: 0.95rem; border-radius: 8px; }
    .btn-edit { background: var(--btn-edit-bg); color: var(--btn-edit-text); padding: 7px 10px; font-size: 0.78rem; border-radius: 8px; }

    .btn-calc {
      width: 100%;
      padding: 15px;
      font-size: 1.05rem;
      background: var(--primary);
      color: var(--primary-text);
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,122,255,0.3);
      letter-spacing: 0.01em;
    }

    .btn-calc:hover:not(:disabled) { filter: brightness(1.08); }

    .btn-rst {
      width: 100%;
      padding: 10px;
      font-size: 0.87rem;
      background: var(--btn-rst-bg);
      color: var(--btn-rst-text);
      margin-top: 8px;
      border-radius: 10px;
    }

    .btn-rst:hover { filter: brightness(0.95); }

    .btn-sm {
      padding: 5px 11px;
      font-size: 0.79rem;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-sub);
      border-radius: 7px;
    }

    .btn-sm:hover { background: var(--tbl-head); }

    /* ===== LINEシェアボタン ===== */
    .btn-copy     { background: #e4f9f5; color: #006b5f; flex: 0 0 auto; padding: 10px 14px; border-radius: 10px; }
    [data-theme="dark"] .btn-copy { background: #0d3b35; color: #5ecfbe; }

    .btn-line-item { flex: 1; background: #d4edda; color: #155724; border-radius: 10px; }
    [data-theme="dark"] .btn-line-item { background: #0d3322; color: #5fcf8a; }

    /* ===== メンバータグ ===== */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 32px;
      margin-top: 8px;
    }

    .tag {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--tag-bg);
      color: var(--tag-text);
      border: 1px solid var(--tag-border);
      border-radius: 20px;
      padding: 4px 12px 4px 14px;
      font-size: 0.87rem;
      font-weight: 500;
    }

    .tag .x {
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 700;
      line-height: 1;
      transition: color 0.1s;
    }

    .tag .x:hover { color: var(--btn-del-text); }

    /* ===== 編集バナー ===== */
    .edit-banner {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: var(--banner-bg);
      border: 1px solid var(--banner-border);
      border-radius: 9px;
      padding: 7px 12px;
      margin-bottom: 12px;
      font-size: 0.84rem;
      color: var(--banner-text);
      transition: background 0.25s;
    }

    .edit-banner.show { display: flex; }

    /* ===== 支払いリスト ===== */
    .payment-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .payment-item:last-child { border-bottom: none; }

    .payment-item.editing {
      background: var(--editing-bg);
      border-radius: 9px;
      padding: 8px;
      margin: 0 -4px;
    }

    .payment-item .payer  { font-weight: 600; min-width: 56px; font-size: 0.9rem; }
    .payment-item .amount { color: var(--plus); font-weight: 700; font-size: 0.9rem; }
    .payment-item .desc   { color: var(--text-sub); font-size: 0.82rem; flex: 1; min-width: 50px; }
    .payment-item .splits-tag {
      flex-basis: 100%;
      font-size: 0.76rem;
      color: var(--text-muted);
      padding-left: 2px;
      margin-top: -2px;
    }

    /* ===== 分担設定エリア ===== */
    .split-area {
      display: none;
      margin-top: 10px;
      padding: 12px 14px;
      background: var(--row-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: background 0.25s;
    }
    .split-area.visible { display: block; }

    /* セグメントコントロール */
    .split-tabs {
      display: flex;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 3px;
      gap: 3px;
      margin-bottom: 12px;
    }
    .split-tab {
      flex: 1;
      padding: 6px 0;
      border-radius: 7px;
      font-size: 0.82rem;
      font-weight: 600;
      background: transparent;
      color: var(--text-muted);
      border: none;
      cursor: pointer;
      transition: background 0.18s, color 0.18s, box-shadow 0.18s;
    }
    .split-tab.active {
      background: var(--card);
      color: var(--text);
      box-shadow: 0 1px 4px var(--shadow);
    }

    /* 均等割りモード */
    .participants-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--text-sub);
    }
    .check-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .check-label {
      display: inline-flex;
      align-items: center;
      padding: 5px 13px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 0.82rem;
      cursor: pointer;
      background: var(--card);
      color: var(--text-sub);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      user-select: none;
    }
    .check-label:hover { border-color: var(--primary); }
    .check-label.checked {
      background: var(--tag-bg);
      border-color: var(--tag-border);
      color: var(--tag-text);
      font-weight: 600;
    }
    .split-preview {
      margin-top: 10px;
      font-size: 0.81rem;
      color: var(--text-sub);
      min-height: 16px;
    }

    /* 金額指定モード */
    .split-inputs { }
    .split-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
    }
    .split-row:last-of-type { border-bottom: none; }
    .split-row .split-name { flex: 1; font-size: 0.88rem; font-weight: 500; }
    .split-row .split-input {
      width: 90px;
      flex: 0 0 auto;
      text-align: right;
      padding: 6px 8px;
      font-size: 0.88rem;
    }
    .split-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding-top: 10px;
      margin-top: 6px;
      border-top: 1px solid var(--border);
      font-size: 0.81rem;
    }
    .split-ok  { color: var(--split-ok);  font-weight: 700; }
    .split-err { color: var(--split-err); font-weight: 700; }

    /* ===== 結果エリア ===== */
    #result { display: none; }

    .balance-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.87rem;
    }

    .balance-table th {
      background: var(--tbl-head);
      padding: 8px 10px;
      text-align: left;
      font-weight: 600;
      color: var(--text-sub);
    }

    .balance-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
    .balance-table tr:last-child td { border-bottom: none; }

    .plus  { color: var(--plus);  font-weight: 700; }
    .minus { color: var(--minus); font-weight: 700; }
    .zero  { color: var(--text-muted); }

    /* ===== 端数注記 ===== */
    .rounding-note {
      font-size: 0.8rem;
      color: var(--text-sub);
      margin-top: 8px;
      padding: 7px 10px;
      background: var(--row-bg);
      border-radius: 8px;
      border-left: 3px solid var(--xfer-border);
    }

    /* ===== テーブル横スクロール ===== */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* ===== 精算ステップ ===== */
    .transfer-list { list-style: none; }

    .transfer-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      margin-bottom: 8px;
      background: var(--row-bg);
      border-radius: 10px;
      border-left: 3px solid var(--xfer-border);
      font-size: 0.92rem;
    }

    .transfer-list li .arrow { color: var(--xfer-border); font-size: 1.05rem; }
    .transfer-list li .amt   { font-weight: 700; color: var(--tag-text); margin-left: auto; }

    .no-transfer {
      text-align: center;
      padding: 18px;
      color: var(--plus);
      font-weight: 600;
      font-size: 0.95rem;
    }

    /* ===== エラーメッセージ ===== */
    .error-msg {
      display: none;
      color: var(--minus);
      font-size: 0.83rem;
      margin-top: 5px;
    }

    /* ===== シェア行 ===== */
    .share-row { display: flex; gap: 8px; margin-top: 12px; }

    /* ===== トースト ===== */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(28,28,30,0.88);
      color: #fff;
      padding: 10px 22px;
      border-radius: 22px;
      font-size: 0.88rem;
      font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      z-index: 9999;
      white-space: nowrap;
      pointer-events: none;
      backdrop-filter: blur(8px);
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    }
    [data-theme="dark"] .toast { background: rgba(240,240,245,0.9); color: #1c1c1e; }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ===== ユーティリティ ===== */
    .mt8  { margin-top: 8px; }
    .mt12 { margin-top: 12px; }
    .center { text-align: center; }
  </style>
</head>
<body>
<div class="container">

  <!-- ヘッダー -->
  <div class="header">
    <h1>💴 割り勘</h1>
    <button class="dark-btn" id="darkBtn" onclick="toggleDark()" title="ダーク／ライト切替">🌙</button>
  </div>

  <!-- localStorage 復元バナー -->
  <div class="restore-banner" id="restoreBanner">
    <span>💾 前回の入力内容が保存されています</span>
    <div class="btn-group">
      <button class="btn-sm" onclick="applyRestore()">復元する</button>
      <button class="btn-sm" onclick="dismissRestore()">破棄</button>
    </div>
  </div>

  <!-- ① メンバーカード -->
  <div class="card">
    <div class="card-title">メンバー</div>
    <div class="row">
      <input type="text" id="memberInput" placeholder="名前を入力（例：田中）" maxlength="20">
      <button class="btn-add" onclick="addMember()">追加</button>
    </div>
    <p class="error-msg" id="memberError"></p>
    <div class="tag-list" id="memberList"></div>
  </div>

  <!-- ② 支払い入力カード -->
  <div class="card">
    <div class="card-title">支払い入力</div>

    <!-- 編集中バナー -->
    <div class="edit-banner" id="editBanner">
      <span>✏️ 支払いを編集中...</span>
      <button class="btn-sm" onclick="cancelEdit()">キャンセル</button>
    </div>

    <div class="row">
      <select id="payerSelect">
        <option value="">支払い者を選択</option>
      </select>
      <input type="number" id="amountInput" placeholder="金額（円）" min="1" step="1" inputmode="numeric">
    </div>
    <div class="row">
      <input type="text" id="descInput" placeholder="内容（例：夕食、交通費）" maxlength="30">
      <button class="btn-add" id="paySubmitBtn" onclick="submitPayment()">追加</button>
    </div>

    <!-- 分担設定エリア -->
    <div class="split-area" id="splitArea">

      <!-- モード切替タブ -->
      <div class="split-tabs">
        <button class="split-tab active" id="tabEqual"  onclick="setSplitMode('equal')">均等割り</button>
        <button class="split-tab"        id="tabCustom" onclick="setSplitMode('custom')">金額指定</button>
      </div>

      <!-- 均等割りモード -->
      <div id="equalArea">
        <div class="participants-header">
          <span>負担者</span>
          <button type="button" class="btn-sm" onclick="selectAllParticipants()">全員</button>
          <button type="button" class="btn-sm" onclick="clearParticipants()">クリア</button>
        </div>
        <div class="check-list" id="participantsChecks"></div>
        <div class="split-preview" id="equalPreview"></div>
      </div>

      <!-- 金額指定モード -->
      <div id="customArea" style="display:none">
        <div class="split-inputs" id="customSplitInputs"></div>
        <div class="split-footer">
          <span id="splitRemainingText"></span>
          <button type="button" class="btn-sm" onclick="resetToEqual()">均等にする</button>
        </div>
      </div>

    </div>

    <p class="error-msg" id="paymentError"></p>
    <div id="paymentList" class="mt8"></div>
  </div>

  <!-- ③ 計算ボタン -->
  <button class="btn-calc" id="calcBtn" onclick="calculate()" disabled>精算を計算する</button>
  <p class="error-msg center" id="calcError" style="margin-top:6px;"></p>

  <!-- ④ 結果カード -->
  <div class="card mt12" id="result">
    <div class="card-title">収支サマリー</div>
    <div class="table-wrap">
      <table class="balance-table">
        <thead>
          <tr>
            <th>名前</th>
            <th>支払い合計</th>
            <th>負担合計</th>
            <th>収支</th>
          </tr>
        </thead>
        <tbody id="balanceBody"></tbody>
      </table>
    </div>
    <p class="rounding-note" id="roundingNote" style="display:none;"></p>

    <hr class="divider">

    <div class="card-title">最小送金プラン</div>
    <div id="transferResult"></div>

    <!-- コピー / LINE -->
    <div class="share-row">
      <button class="btn-copy" onclick="copyResult()">📋 コピー</button>
      <button class="btn-line-item" onclick="shareToLine()">💬 LINEで送る</button>
    </div>

    <button class="btn-rst" onclick="resetAll()">🔄 リセット</button>
  </div>

</div>

<!-- トースト通知 -->
<div class="toast" id="toast"></div>

<script>
  // ===== 状態 =====
  const state = {
    members:   [],
    payments:  [],   // { id, payer, amount, desc, splits:[{userId,amount}], createdAt }
    editIndex: -1,
    lastCalc:  null
  };

  let pendingSaved = null;
  let splitMode = 'equal'; // 'equal' | 'custom'

  // ===== ユーティリティ =====
  const $ = id => document.getElementById(id);

  function showError(id, msg) {
    const el = $(id);
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.style.display = 'none'; }, 3500);
  }

  let _toastTimer;
  function showToast(msg, ms = 2200) {
    clearTimeout(_toastTimer);
    const el = $('toast');
    el.textContent = msg;
    el.classList.add('show');
    _toastTimer = setTimeout(() => el.classList.remove('show'), ms);
  }

  function fmt(n) {
    return '¥' + Math.abs(n).toLocaleString('ja-JP');
  }

  function fmtSigned(n) {
    const sign = n > 0 ? '+' : n < 0 ? '-' : '';
    return sign + '¥' + Math.abs(n).toLocaleString('ja-JP');
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  }

  // ===== localStorage 永続化 =====
  const STORE_KEY = 'warikan_v3';

  function saveState() {
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify({
        members:  state.members,
        payments: state.payments
      }));
    } catch(e) {}
  }

  function initFromStorage() {
    try {
      const raw = localStorage.getItem(STORE_KEY)
               || localStorage.getItem('warikan_v2'); // 旧バージョン互換
      if (!raw) return;
      const data = JSON.parse(raw);
      const hasData = (data.members  && data.members.length  > 0) ||
                      (data.payments && data.payments.length > 0);
      if (hasData) {
        pendingSaved = data;
        $('restoreBanner').classList.add('show');
      }
    } catch(e) {
      localStorage.removeItem(STORE_KEY);
    }
  }

  function applyRestore() {
    if (!pendingSaved) return;
    state.members  = pendingSaved.members  || [];
    // 旧データ（participants）を splits に移行
    state.payments = (pendingSaved.payments || []).map(migrateLegacyPayment);
    pendingSaved = null;
    $('restoreBanner').classList.remove('show');
    renderAll();
    showToast('✅ 前回の入力内容を復元しました');
  }

  function dismissRestore() {
    pendingSaved = null;
    $('restoreBanner').classList.remove('show');
    localStorage.removeItem(STORE_KEY);
    localStorage.removeItem('warikan_v2');
  }

  /**
   * 旧フォーマット（participants[]）→新フォーマット（splits[]）へ変換
   * 既に splits があればそのまま返す
   */
  function migrateLegacyPayment(p) {
    if (p.splits && p.splits.length > 0) return p;
    const parts = (p.participants && p.participants.length > 0)
      ? p.participants
      : state.members;
    return {
      id:        p.id        || genId(),
      payer:     p.payer,
      amount:    p.amount,
      desc:      p.desc      || '（記録なし）',
      splits:    computeEqualSplits(p.amount, parts, p.payer),
      createdAt: p.createdAt || Date.now()
    };
  }

  // ===== ダークモード =====
  function initTheme() {
    if (localStorage.getItem('warikan_dark') === 'true') {
      document.documentElement.setAttribute('data-theme', 'dark');
      $('darkBtn').textContent = '☀️';
    }
  }

  function toggleDark() {
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (dark) {
      document.documentElement.removeAttribute('data-theme');
      $('darkBtn').textContent = '🌙';
      localStorage.setItem('warikan_dark', 'false');
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
      $('darkBtn').textContent = '☀️';
      localStorage.setItem('warikan_dark', 'true');
    }
  }

  // ===== 計算ボタン有効化 =====
  function updateCalcBtn() {
    const ok = state.members.length >= 2 && state.payments.length >= 1;
    const btn = $('calcBtn');
    btn.disabled = !ok;
    btn.title = ok ? '' :
      state.members.length < 2 ? 'メンバーを2人以上追加してください'
                                : '支払い情報を1件以上入力してください';
  }

  // ===== メンバー =====
  function addMember() {
    const input = $('memberInput');
    const name  = input.value.trim();

    if (!name)                        { showError('memberError', '名前を入力してください'); return; }
    if (state.members.includes(name)) { showError('memberError', `「${name}」は既に追加されています`); return; }
    if (state.members.length >= 20)   { showError('memberError', 'メンバーは最大20人です'); return; }

    state.members.push(name);
    input.value = '';
    renderMembers();
    syncPayerSelect();
    refreshSplitArea();
    updateCalcBtn();
    saveState();
  }

  function removeMember(name) {
    const payCount = state.payments.filter(p => p.payer === name).length;
    const msg = payCount > 0
      ? `「${name}」を削除します。\nこのメンバーの支払い記録（${payCount}件）も削除されます。よろしいですか？`
      : `「${name}」を削除しますか？`;
    if (!confirm(msg)) return;

    state.payments = state.payments.filter(p => p.payer !== name);
    state.payments.forEach(p => {
      if (p.splits) p.splits = p.splits.filter(s => s.userId !== name);
    });
    state.members = state.members.filter(m => m !== name);
    cancelEdit();
    renderAll();
    saveState();
    $('result').style.display = 'none';
  }

  function renderMembers() {
    const list = $('memberList');
    if (state.members.length === 0) {
      list.innerHTML = '<span style="color:var(--text-muted);font-size:0.84rem;">メンバーがいません</span>';
      return;
    }
    list.innerHTML = state.members.map(name => `
      <div class="tag">
        ${esc(name)}
        <span class="x" onclick="removeMember('${esc(name)}')" title="削除">×</span>
      </div>
    `).join('');
  }

  function syncPayerSelect() {
    const sel = $('payerSelect');
    const cur = sel.value;
    sel.innerHTML = '<option value="">支払い者を選択</option>' +
      state.members.map(m =>
        `<option value="${esc(m)}"${m === cur ? ' selected' : ''}>${esc(m)}</option>`
      ).join('');
  }

  // ===== 分担設定エリア全体の表示制御 =====
  function refreshSplitArea() {
    const area = $('splitArea');
    if (state.members.length === 0) {
      area.classList.remove('visible');
      return;
    }
    area.classList.add('visible');
    if (splitMode === 'equal') {
      renderParticipantsChecks();
      updateEqualPreview();
    } else {
      renderCustomSplitInputs();
    }
  }

  // ===== モード切替 =====
  function setSplitMode(mode) {
    splitMode = mode;
    $('tabEqual').classList.toggle('active',  mode === 'equal');
    $('tabCustom').classList.toggle('active', mode === 'custom');
    $('equalArea').style.display  = mode === 'equal'  ? '' : 'none';
    $('customArea').style.display = mode === 'custom' ? '' : 'none';
    if (mode === 'equal')  {
      renderParticipantsChecks();
      updateEqualPreview();
      $('paySubmitBtn').disabled = false; // カスタムモードの非活性を解除
    }
    if (mode === 'custom') { renderCustomSplitInputs(); }
  }

  // ===== 均等割りモード =====

  /**
   * 均等割り: 端数は支払者負担（支払者が参加者にいない場合は最後の参加者）
   */
  function computeEqualSplits(amount, participants, payer = null) {
    if (!participants || participants.length === 0) return [];
    const n           = participants.length;
    const share       = Math.floor(amount / n);
    const rem         = amount - share * n;
    const remReceiver = (payer && participants.includes(payer))
      ? payer
      : participants[participants.length - 1];
    return participants.map(userId => ({
      userId,
      amount: rem > 0 && userId === remReceiver ? share + rem : share
    }));
  }

  function renderParticipantsChecks() {
    const list = $('participantsChecks');
    if (state.members.length === 0) { list.innerHTML = ''; return; }

    const existingNames   = new Set(Array.from(list.querySelectorAll('.check-label')).map(el => el.dataset.name));
    const existingChecked = new Set(Array.from(list.querySelectorAll('.check-label.checked')).map(el => el.dataset.name));

    list.innerHTML = state.members.map(name => {
      const checked = existingNames.size === 0 || existingChecked.has(name) || !existingNames.has(name);
      return `<span class="check-label${checked ? ' checked' : ''}" data-name="${esc(name)}" onclick="toggleParticipant(this)">${esc(name)}</span>`;
    }).join('');
  }

  function toggleParticipant(el) {
    el.classList.toggle('checked');
    updateEqualPreview();
  }

  function selectAllParticipants() {
    document.querySelectorAll('#participantsChecks .check-label').forEach(el => el.classList.add('checked'));
    updateEqualPreview();
  }

  function clearParticipants() {
    document.querySelectorAll('#participantsChecks .check-label').forEach(el => el.classList.remove('checked'));
    updateEqualPreview();
  }

  function getSelectedParticipants() {
    return Array.from(document.querySelectorAll('#participantsChecks .check-label.checked'))
      .map(el => el.dataset.name);
  }

  function setCheckedParticipants(names) {
    const nameSet = new Set(names);
    document.querySelectorAll('#participantsChecks .check-label').forEach(el => {
      el.classList.toggle('checked', nameSet.has(el.dataset.name));
    });
    updateEqualPreview();
  }

  function updateEqualPreview() {
    const preview      = $('equalPreview');
    const participants = getSelectedParticipants();
    const amount       = parseInt($('amountInput').value, 10);

    if (participants.length === 0 || !amount || amount < 1) {
      preview.textContent = '';
      return;
    }

    const share = Math.floor(amount / participants.length);
    const rem   = amount - share * participants.length;

    if (rem > 0) {
      const payer       = $('payerSelect').value;
      const remReceiver = (payer && participants.includes(payer))
        ? payer : participants[participants.length - 1];
      preview.textContent = `1人あたり ${fmt(share)} ／ ${esc(remReceiver)}（支払者）のみ +¥${rem}（端数）`;
    } else {
      preview.textContent = `1人あたり ${fmt(share)}`;
    }
  }

  // ===== 金額指定モード =====

  function renderCustomSplitInputs(preserveValues = false) {
    const area   = $('customSplitInputs');
    const amount = parseInt($('amountInput').value, 10) || 0;

    // 既存の入力値を保持するか均等から計算するか
    let initialValues = {};
    if (preserveValues) {
      area.querySelectorAll('.split-row').forEach(row => {
        const val = parseInt(row.querySelector('.split-input').value, 10);
        if (!isNaN(val)) initialValues[row.dataset.name] = val;
      });
    }

    const splits = computeEqualSplits(amount, state.members, $('payerSelect').value || null);

    area.innerHTML = splits.map(s => {
      const val = preserveValues && initialValues[s.userId] !== undefined
        ? initialValues[s.userId]
        : s.amount;
      return `
        <div class="split-row" data-name="${esc(s.userId)}">
          <span class="split-name">${esc(s.userId)}</span>
          <input class="split-input" type="number" min="0" step="1" inputmode="numeric"
                 value="${val}"
                 oninput="this.value=this.value.replace(/[^0-9]/g,''); updateCustomRemaining()">
        </div>
      `;
    }).join('');

    updateCustomRemaining();
  }

  function updateCustomRemaining() {
    const amount = parseInt($('amountInput').value, 10) || 0;
    const inputs = $('customSplitInputs').querySelectorAll('.split-input');
    const summed = Array.from(inputs).reduce((s, el) => s + (parseInt(el.value, 10) || 0), 0);
    const diff   = amount - summed;
    const el     = $('splitRemainingText');
    const btn    = $('paySubmitBtn');

    if (diff === 0 && amount > 0) {
      el.innerHTML  = `<span class="split-ok">✓ 合計 ${fmt(amount)}</span>`;
      btn.disabled  = false;
    } else if (diff > 0) {
      el.innerHTML  = `<span class="split-err">残り ${fmt(diff)}</span>`;
      btn.disabled  = true;
    } else if (diff < 0) {
      el.innerHTML  = `<span class="split-err">超過 ${fmt(Math.abs(diff))}</span>`;
      btn.disabled  = true;
    } else {
      el.innerHTML  = '';
      btn.disabled  = true;
    }
  }

  function resetToEqual() {
    renderCustomSplitInputs(false);
  }

  // ===== 現在のUIから splits を構築 =====
  function getBuiltSplits() {
    const amount = parseInt($('amountInput').value, 10) || 0;

    if (splitMode === 'equal') {
      const participants = getSelectedParticipants();
      return computeEqualSplits(amount, participants, $('payerSelect').value || null);
    }

    // custom: 0円の人は除外
    const splits = [];
    $('customSplitInputs').querySelectorAll('.split-row').forEach(row => {
      const userId = row.dataset.name;
      const amt    = parseInt(row.querySelector('.split-input').value, 10) || 0;
      if (amt > 0) splits.push({ userId, amount: amt });
    });
    return splits;
  }

  // ===== 支払い =====
  function submitPayment() {
    const payer  = $('payerSelect').value;
    const rawVal = $('amountInput').value;
    const amount = parseInt(rawVal, 10);
    const desc   = $('descInput').value.trim();

    if (!payer)                       { showError('paymentError', '支払い者を選択してください'); return; }
    if (rawVal === '')                { showError('paymentError', '金額を入力してください'); return; }
    if (isNaN(amount) || amount < 1) { showError('paymentError', '1円以上の整数を入力してください'); return; }
    if (amount > 999_999_999)        { showError('paymentError', '金額が大きすぎます（上限9桁）'); return; }

    const splits = getBuiltSplits();
    if (splits.length === 0) {
      showError('paymentError', '負担者を1人以上選択してください');
      return;
    }

    // 金額指定モードの合計チェック
    if (splitMode === 'custom') {
      const total = splits.reduce((s, sp) => s + sp.amount, 0);
      if (total !== amount) {
        showError('paymentError', `負担額の合計（${fmt(total)}）が支払金額（${fmt(amount)}）と一致しません`);
        return;
      }
    }

    const entry = {
      id:        state.editIndex >= 0 ? state.payments[state.editIndex].id : genId(),
      payer,
      amount,
      desc:      desc || '（記録なし）',
      splits,
      createdAt: state.editIndex >= 0 ? state.payments[state.editIndex].createdAt : Date.now()
    };

    if (state.editIndex >= 0) {
      state.payments[state.editIndex] = entry;
      cancelEdit();
      showToast('✅ 支払い情報を更新しました');
    } else {
      state.payments.push(entry);
    }

    $('amountInput').value = '';
    $('descInput').value   = '';
    $('payerSelect').value = '';
    setSplitMode('equal');
    selectAllParticipants();
    renderPayments();
    updateCalcBtn();
    saveState();
    $('result').style.display = 'none';
  }

  function startEdit(index) {
    const p = state.payments[index];
    state.editIndex = index;
    $('payerSelect').value        = p.payer;
    $('amountInput').value        = p.amount;
    $('descInput').value          = p.desc === '（記録なし）' ? '' : p.desc;
    $('paySubmitBtn').textContent = '更新';
    $('editBanner').classList.add('show');

    const splits = p.splits || [];

    // 均等割りかどうか判定
    const participants = splits.map(s => s.userId);
    const equalSplits  = computeEqualSplits(p.amount, participants, p.payer);
    const isEqual = splits.length === equalSplits.length &&
      splits.every((s, i) => s.userId === equalSplits[i].userId && s.amount === equalSplits[i].amount);

    if (isEqual) {
      setSplitMode('equal');
      setCheckedParticipants(participants);
    } else {
      setSplitMode('custom');
      // カスタム入力を手動で設定
      const area = $('customSplitInputs');
      renderCustomSplitInputs(false);
      splits.forEach(s => {
        const row = area.querySelector(`.split-row[data-name="${s.userId}"]`);
        if (row) row.querySelector('.split-input').value = s.amount;
      });
      updateCustomRemaining();
    }

    renderPayments();
    $('payerSelect').scrollIntoView({ behavior: 'smooth', block: 'center' });
    $('payerSelect').focus();
  }

  function cancelEdit() {
    if (state.editIndex < 0) return;
    state.editIndex = -1;
    $('payerSelect').value        = '';
    $('amountInput').value        = '';
    $('descInput').value          = '';
    $('paySubmitBtn').textContent = '追加';
    $('editBanner').classList.remove('show');
    setSplitMode('equal');
    selectAllParticipants();
    renderPayments();
  }

  function removePayment(index) {
    if (state.editIndex === index) cancelEdit();
    state.payments.splice(index, 1);
    if (state.editIndex > index) state.editIndex--;
    renderPayments();
    updateCalcBtn();
    saveState();
    $('result').style.display = 'none';
  }

  function renderPayments() {
    const list = $('paymentList');
    if (state.payments.length === 0) {
      list.innerHTML = '<p style="color:var(--text-muted);font-size:0.84rem;">支払い記録がありません</p>';
      return;
    }
    list.innerHTML = state.payments.map((p, i) => {
      const splits = p.splits || [];
      let splitsTag = '';
      if (splits.length === 0) {
        splitsTag = '👥 負担者なし';
      } else if (splits.length === state.members.length) {
        splitsTag = '👥 全員';
      } else {
        splitsTag = '👥 ' + splits.map(s => esc(s.userId)).join('・');
      }
      // 均等かカスタムか
      const participants = splits.map(s => s.userId);
      const equalSplits  = computeEqualSplits(p.amount, participants, p.payer);
      const isEqual = splits.length > 0 && splits.every((s, i) =>
        s.userId === (equalSplits[i] && equalSplits[i].userId) &&
        s.amount === (equalSplits[i] && equalSplits[i].amount)
      );
      if (!isEqual && splits.length > 0) {
        splitsTag += '（金額指定）';
      }
      return `
        <div class="payment-item${state.editIndex === i ? ' editing' : ''}">
          <span class="payer">${esc(p.payer)}</span>
          <span class="amount">${fmt(p.amount)}</span>
          <span class="desc">${esc(p.desc)}</span>
          <button class="btn-edit" onclick="startEdit(${i})" title="編集">✏️</button>
          <button class="btn-del"  onclick="removePayment(${i})" title="削除">×</button>
          <span class="splits-tag">${splitsTag}</span>
        </div>
      `;
    }).join('');
  }

  // ===== 精算計算 =====
  function calculate() {
    // 支払い合計（支払者別）
    const paid = {};
    state.members.forEach(m => { paid[m] = 0; });
    state.payments.forEach(p => { paid[p.payer] += p.amount; });

    // 負担合計（splits ベース）
    const burden = {};
    state.members.forEach(m => { burden[m] = 0; });
    let hasRounding = false;

    state.payments.forEach(p => {
      const splits = p.splits || [];
      splits.forEach(s => {
        if (burden[s.userId] !== undefined) burden[s.userId] += s.amount;
      });
      // 端数チェック: splits の合計が amount に満たない場合
      const splitsTotal = splits.reduce((s, sp) => s + sp.amount, 0);
      if (splitsTotal < p.amount) hasRounding = true;
    });

    // 収支 = 支払った − 負担した
    const balance = {};
    state.members.forEach(m => { balance[m] = paid[m] - burden[m]; });

    // 収支サマリー
    $('balanceBody').innerHTML = state.members.map(m => {
      const b   = balance[m];
      const cls = b > 0 ? 'plus' : b < 0 ? 'minus' : 'zero';
      return `
        <tr>
          <td>${esc(m)}</td>
          <td>${fmt(paid[m])}</td>
          <td>${fmt(burden[m])}</td>
          <td class="${cls}">${fmtSigned(b)}</td>
        </tr>
      `;
    }).join('');

    const noteEl = $('roundingNote');
    if (hasRounding) {
      noteEl.textContent = '※端数は切り捨てています（最後の負担者に集約）';
      noteEl.style.display = 'block';
    } else {
      noteEl.style.display = 'none';
    }

    // Greedy法: 最小送金数で精算
    const creditors = [];
    const debtors   = [];
    state.members.forEach(m => {
      if (balance[m] > 0) creditors.push({ name: m, amount:  balance[m] });
      if (balance[m] < 0) debtors.push({   name: m, amount: -balance[m] });
    });
    creditors.sort((a, b) => b.amount - a.amount);
    debtors.sort((a, b)   => b.amount - a.amount);

    const transfers = greedySettle(creditors, debtors);

    const div = $('transferResult');
    if (transfers.length === 0) {
      div.innerHTML = '<div class="no-transfer">🎉 精算不要！全員均等に支払っています</div>';
    } else {
      div.innerHTML = `
        <p style="font-size:0.83rem;color:var(--text-sub);margin-bottom:10px;">
          合計 <strong>${transfers.length} 回</strong> の送金で精算できます
        </p>
        <ul class="transfer-list">
          ${transfers.map(t => `
            <li>
              <span>${esc(t.from)}</span>
              <span class="arrow">→</span>
              <span>${esc(t.to)}</span>
              <span class="amt">${fmt(t.amount)}</span>
            </li>
          `).join('')}
        </ul>
      `;
    }

    state.lastCalc = { paid, burden, balance, transfers };

    $('result').style.display = 'block';
    $('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  /**
   * Greedy法: 最大の債権者と債務者を順次相殺して最小送金数を実現
   */
  function greedySettle(creditors, debtors) {
    const transfers = [];
    let ci = 0, di = 0;

    while (ci < creditors.length && di < debtors.length) {
      const cr     = creditors[ci];
      const de     = debtors[di];
      const amount = Math.min(cr.amount, de.amount);

      if (amount > 0) transfers.push({ from: de.name, to: cr.name, amount });

      cr.amount -= amount;
      de.amount -= amount;

      if (cr.amount === 0) ci++;
      if (de.amount === 0) di++;
    }

    return transfers;
  }

  // ===== 結果テキスト生成（コピー・LINE 共通） =====
  function buildResultText() {
    if (!state.lastCalc) return '';
    const { transfers } = state.lastCalc;

    const lines = ['【割り勘精算結果】', ''];

    lines.push('📋 支払い内訳');
    state.payments.forEach(p => {
      const desc   = (p.desc && p.desc !== '（記録なし）') ? p.desc : '記録なし';
      const amtStr = '¥' + p.amount.toLocaleString('ja-JP');
      lines.push(`・${p.payer} ${amtStr}（${desc}）`);
    });
    lines.push('');

    if (transfers.length === 0) {
      lines.push('📤 精算不要（全員均等）');
    } else {
      lines.push(`📤 最小送金プラン（合計${transfers.length}回）`);
      transfers.forEach(t => {
        lines.push(`${t.from} → ${t.to}　¥${t.amount.toLocaleString('ja-JP')}`);
      });
    }

    lines.push('');
    lines.push('💰 PayPayで送る');
    lines.push('https://bit.ly/warikan-pay');

    return lines.join('\n');
  }

  // ===== コピー =====
  function copyResult() {
    const text = buildResultText();
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(text)
        .then(() => showToast('📋 クリップボードにコピーしました'))
        .catch(() => fallbackCopy(text));
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    const el = Object.assign(document.createElement('textarea'), {
      value: text, style: 'position:fixed;left:-9999px;top:-9999px'
    });
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('📋 クリップボードにコピーしました');
  }

  // ===== LINE シェア =====
  function shareToLine() {
    const lineUrl = 'https://line.me/R/msg/text/?' + encodeURIComponent(buildResultText());
    window.open(lineUrl, '_blank', 'noopener,noreferrer');
  }

  // ===== リセット =====
  function resetAll() {
    if (!confirm('すべてのデータを削除してリセットしますか？\nこの操作は取り消せません。')) return;
    state.members   = [];
    state.payments  = [];
    state.editIndex = -1;
    renderAll();
    $('result').style.display = 'none';
    localStorage.removeItem(STORE_KEY);
    showToast('🔄 リセットしました');
  }

  // ===== まとめて再描画 =====
  function renderAll() {
    renderMembers();
    renderPayments();
    syncPayerSelect();
    setSplitMode('equal');
    refreshSplitArea();
    selectAllParticipants();
    updateCalcBtn();
    $('paySubmitBtn').textContent = '追加';
    $('editBanner').classList.remove('show');
  }

  // ===== キーボード =====
  $('memberInput').addEventListener('keydown', e => { if (e.key === 'Enter') addMember(); });
  $('amountInput').addEventListener('keydown', e => { if (e.key === 'Enter') submitPayment(); });
  $('descInput').addEventListener('keydown',   e => { if (e.key === 'Enter') submitPayment(); });

  $('amountInput').addEventListener('input', function() {
    this.value = this.value.replace(/[^0-9]/g, '');
    if (splitMode === 'equal')  updateEqualPreview();
    if (splitMode === 'custom') updateCustomRemaining();
  });

  // ===== 初期化 =====
  initTheme();
  initFromStorage();
  renderAll();

  // ===== Service Worker 登録（PWA） =====
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').catch(() => {});
    });
  }
</script>
</body>
</html>

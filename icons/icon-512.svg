<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%"   stop-color="#4da3ff"/>
      <stop offset="100%" stop-color="#0048c8"/>
    </linearGradient>
  </defs>

  <!-- Squircle background (iOS 22% corner radius) -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Source node -->
  <circle cx="256" cy="123" r="37" fill="white"/>

  <!-- Stem -->
  <line x1="256" y1="160" x2="256" y2="256"
        stroke="white" stroke-width="27" stroke-linecap="round"/>

  <!-- Horizontal bar -->
  <line x1="128" y1="256" x2="384" y2="256"
        stroke="white" stroke-width="27" stroke-linecap="round"/>

  <!-- Left branch -->
  <line x1="128" y1="256" x2="128" y2="352"
        stroke="white" stroke-width="27" stroke-linecap="round"/>

  <!-- Center branch -->
  <line x1="256" y1="256" x2="256" y2="352"
        stroke="white" stroke-width="27" stroke-linecap="round"/>

  <!-- Right branch -->
  <line x1="384" y1="256" x2="384" y2="352"
        stroke="white" stroke-width="27" stroke-linecap="round"/>

  <!-- Destination nodes -->
  <circle cx="128" cy="389" r="37" fill="white"/>
  <circle cx="256" cy="389" r="37" fill="white"/>
  <circle cx="384" cy="389" r="37" fill="white"/>
</svg>
